name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract description from header: ## [0.1.0] — Description - date
          TITLE_LINE=$(grep -m1 "^## \[$VERSION\]" CHANGELOG.md || true)
          if echo "$TITLE_LINE" | grep -q " — "; then
            DESCRIPTION=$(echo "$TITLE_LINE" | sed 's/.*— //' | sed 's/ - [0-9].*//')
            RELEASE_NAME="v$VERSION — $DESCRIPTION"
          else
            RELEASE_NAME="v$VERSION"
          fi
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

          # Extract body for this version
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          # Append Full Changelog link if a previous tag exists
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            NOTES="$NOTES

Full Changelog: [$PREV_TAG...${GITHUB_REF_NAME}](https://github.com/${{ github.repository }}/compare/$PREV_TAG...${GITHUB_REF_NAME})"
          fi

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" \
            custom_components/unison_nz/manifest.json

      - name: Commit manifest version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump manifest version to ${{ steps.version.outputs.version }}"
          file_pattern: custom_components/unison_nz/manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.changelog.outputs.release_name }}"
          body: ${{ steps.changelog.outputs.notes }}
